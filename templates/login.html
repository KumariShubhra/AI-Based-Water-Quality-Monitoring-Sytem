<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Water Quality System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    background:url('https://static.vecteezy.com/system/resources/thumbnails/001/406/190/small/blue-river-running-through-a-forest-free-photo.jpeg') no-repeat center/cover;
    background-position:center 45%;
    display:flex;
    align-items:center;
    justify-content:center;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(90deg, rgba(0,0,0,0.65) 0%, rgba(0,120,200,0.25) 55%, rgba(255,255,255,0.08) 100%);
    top:0;
    left:0;
}

.wrapper{
    position:relative;
    width:85%;
    max-width:1200px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-left:60px;
}

.left{
    color:white;
    max-width:520px;
}

.left h1{
    font-size:60px;
    line-height:1.1;
    font-weight:600;
    text-shadow:0 6px 30px rgba(0,0,0,0.6);
}

.left p{
    margin-top:15px;
    font-size:20px;
    opacity:0.95;
}

.login-box{
    width:360px;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.35);
    backdrop-filter:blur(20px);
    box-shadow:0 25px 80px rgba(0,0,0,0.7);
    transform:translateX(20px);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
    color:#0f172a;
}

.input-box{
    margin-bottom:15px;
}

.input-box label{
    font-size:14px;
    color:#0f172a;
}

.input-box input{
    width:100%;
    padding:14px;
    margin-top:6px;
    border:none;
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,0.95);
}

button{
    width:100%;
    padding:14px;
    background:linear-gradient(135deg,#0ea5e9,#2563eb);
    border:none;
    border-radius:12px;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.06);
    box-shadow:0 10px 25px rgba(37,99,235,0.6);
}

.switch{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    cursor:pointer;
    color:#0f172a;
    font-weight:500;
}

.hidden{
    display:none;
}

@media(max-width:900px){
    .wrapper{
        flex-direction:column;
        text-align:center;
        padding-left:0;
    }

    .left{
        margin-bottom:30px;
    }

    .login-box{
        transform:none;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- LEFT TEXT -->
    <div class="left">
        <h1>AI Water Quality System</h1>
        <p>Clean water. Smart future.</p>
    </div>

    <!-- LOGIN BOX -->
    <div class="login-box">

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <h2>Login</h2>

            <form action="/login" method="POST">
                <div class="input-box">
                    <label>Email</label>
                    <input type="text" name="username" placeholder="Enter Username" required>
                </div>

                <div class="input-box">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter Password" required>
                </div>

                <button type="submit">Login</button>
            </form>

            <div class="switch" onclick="showSignup()">
                New user? Sign Up
            </div>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" class="hidden">
            <h2>Sign Up</h2>

            <form>
                <div class="input-box">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter Name" required>
                </div>

                <div class="input-box">
                    <label>Email</label>
                    <input type="email" placeholder="Enter Email" required>
                </div>

                <div class="input-box">
                    <label>Password</label>
                    <input type="password" placeholder="Create Password" required>
                </div>

                <button type="submit">Sign Up</button>
            </form>

            <div class="switch" onclick="showLogin()">
                Already have an account? Login
            </div>
        </div>

    </div>

</div>

<script>
function showSignup(){
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("signupForm").classList.remove("hidden");
}

function showLogin(){
    document.getElementById("signupForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}
</script>

</body>
</html>
